# Disable RDB snapshots (if persistence is not needed)
save ""

# Set memory limits and eviction policy
maxmemory 256mb
maxmemory-policy allkeys-lru

# Disable Append-Only File for reduced disk I/O
appendonly no

# Increase maximum clients to handle more connections
maxclients 10000

# Set the RDB file path
dir /data

# Logging (optional)
logfile "/var/log/redis/redis.log"