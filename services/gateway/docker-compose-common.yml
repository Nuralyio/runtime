version: '3.4'

services:

  postgres:
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /data/postgres
    volumes:
       - postgres-data:/data/postgres
   
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
       - pgadmin-data:/var/lib/pgadmin

    ports:
      - "${PGADMIN_PORT:-5050}:80"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Nginx/Dockerfile
    volumes:
      - ./Nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf
    environment:
      KEYCLOAK_HOST :  ${KEYCLOAK_HOST:-127.0.0.1} 
      KEYCLOAK_REALM : ${KEYCLOAK_REALM:-dev} 
      KEYCLOAK_CLIENT_ID :  ${KEYCLOAK_CLIENT_ID:-dev} 
      KEYCLOAK_CLIENT_SECRET :  ${KEYCLOAK_CLIENT_SECRET:-xZnlKXQNK5bb77O4dO5vbzgi2wgNc7Ok} 
      KEYCLOAK_SCHEME :  ${KEYCLOAK_SCHEME:-http} 

    restart: unless-stopped
    
    ports:
      - 80:80
      - 443:443
    extra_hosts:
      - "host.docker.internal:host-gateway"

  keycloak_pg:
      image: postgres:13.7
      volumes:
        - keycloak-db-data:/var/lib/postgresql/data
      environment:
        POSTGRES_DB: keycloakDB
        POSTGRES_USER: keycloak
        POSTGRES_PASSWORD: changeMe
  redis:
    image: "redis:alpine"
    volumes:
        - ./redis/data:/data
        - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
  memcached:  # Add the Memcached service definition
    image: memcached:latest
    ports:
      - "11211:11211"
    restart: unless-stopped
    
  keycloak:
      build: 
        context: .
        dockerfile : Keycloack/Dockerfile
      
      environment:
#Database Configuration
        KC_DB: keycloakDB
        KC_DB_URL: 'jdbc:postgresql://keycloak_pg/keycloakDB'
        KC_DB_USERNAME: keycloak
        KC_DB_PASSWORD: changeMe
        KC_DB_SCHEMA: public
#Hostname Configuration
        KC_HOSTNAME_STRICT_HTTPS: ${KC_HOSTNAME_STRICT_HTTPS:-"false"}  

#Admin Credentials
        KEYCLOAK_USER: admin
        KEYCLOAK_PASSWORD: user
        KEYCLOAK_ADMIN: admin
        KEYCLOAK_ADMIN_PASSWORD: admin
        KC_HTTP_RELATIVE_PATH: "/auth"
        KC_HOSTNAME: ${KEYCLOAK_HOST:-localhost} 
      ports:
        - 8080:8080
      depends_on:
        - keycloak_pg
      volumes: 
        - ./Keycloack/ktheme/theme/keywind:/opt/keycloak/themes/keywind
        
volumes:
  postgres-data:
  pgadmin-data:
  keycloak-db-data:
  redis-data:
