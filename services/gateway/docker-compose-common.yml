version: "3.4"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /data/postgres
    volumes:
      - postgres-data:/data/postgres

    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    restart: unless-stopped

    # extra_hosts:
    # - "host.docker.internal:host-gateway"

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    volumes:
       - ./redis/data:/data
       - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: ["redis-server"]
  keycloak:
    image: 058264075488.dkr.ecr.eu-central-1.amazonaws.com/keycloak
    environment:
      KC_DB: keycloak
      KC_DB_URL: 'jdbc:postgresql://postgres/keycloak'
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-postgres} 
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-postgres}
      KC_DB_SCHEMA: public
      KC_HOSTNAME_STRICT_HTTPS: ${KC_HOSTNAME_STRICT_HTTPS:-false}  
      #KC_HTTP_ENABLED: true
      #KC_HOSTNAME_URL: https://nuraly.io
      KC_HOSTNAME_ADMIN_URL: ${KC_HOSTNAME_ADMIN_URL:-https://nuraly.io/auth}  

      KEYCLOAK_USER: ${KEYCLOAK_USERNAME:-admin} 
      KEYCLOAK_PASSWORD: ${KEYCLOAK_PASSWORD:-user} 
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USERNAME:-admin} 
      KEYCLOAK_ADMIN_PASSWORD: ${KC_HOSTNAME_ADMIN_PASSWORD:-admin} 
      KC_HTTP_RELATIVE_PATH: "/auth"
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost} 
    ports:
      - 8080:8080

  copilot:
    image: 058264075488.dkr.ecr.eu-central-1.amazonaws.com/copilot:main
    environment:
      MISTRAL_API_KEY: ix8kAONz0rQwUZdsKtDMny15Z2jbqH8W
    ports:
      - 6070:6070
  rabbitmq:
    image: "rabbitmq:management"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "15672:15672"  # RabbitMQ Management UI
      - "5672:5672"    # RabbitMQ AMQP protocol
    restart: unless-stopped
volumes:
  pgadmin-data:
