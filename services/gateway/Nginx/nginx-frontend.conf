
worker_processes 1;

error_log  logs/error.log;
error_log  logs/error.log  notice;
error_log logs/error.log info;


include config/env-vars.conf;

include config/events.conf;


http {
    include config/http.conf;

    include config/upstreams/frontend-env-upstreams.conf;

    # Main server block for direct access (localhost, main domain)
    server {
        listen 80;
        server_name localhost;

        # Variables for Lua subdomain routing
        set $app_id "";
        set $page_id "";

        include config/redis.conf;

        include locations/locations.conf;

    }

    # Wildcard subdomain server block
    server {
        listen 80;
        server_name ~^(?<subdomain>[^.]+)\.localhost$;

        # Variables for Lua subdomain routing
        set $app_id "";
        set $page_id "";

        include config/redis.conf;

        include locations/subdomain.conf;

        # Fallback for static assets and other routes
        location ~ ^/(api|auth|cb|_astro|favicon) {
            include locations/locations.conf;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}