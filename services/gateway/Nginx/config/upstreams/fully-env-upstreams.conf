# Dynamic upstream resolution - nginx won't crash if services are unavailable
# Uses Docker's internal DNS resolver

resolver 127.0.0.11 valid=10s ipv6=off;

# Upstream variables - set in server blocks for dynamic resolution
# These are used with proxy_pass $variable syntax to enable runtime resolution

map $host $upstream_front {
    default "http://studio:4321";
}

map $host $upstream_services_api {
    default "http://api:8000";
}

map $host $upstream_functions_api {
    default "http://functions:9000";
}

map $host $upstream_kv_api {
    default "http://kv:7003";
}

map $host $upstream_conduit_api {
    default "http://conduit:7004";
}

map $host $upstream_textlens_api {
    default "http://textlens-api:7006";
}

map $host $upstream_workflows_api {
    default "http://workflows:7002";
}

map $host $upstream_journal_api {
    default "http://journal:7005";
}

map $host $upstream_parcour_api {
    default "http://parcour:7007";
}

map $host $upstream_keycloak {
    default "http://keycloak:8080";
}
