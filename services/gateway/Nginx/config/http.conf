include mime.types;
default_type application/octet-stream;
lua_package_path '~/lua/?.lua;;';
lua_shared_dict discovery 1m;

lua_shared_dict jwks 1m;
sendfile off;
gzip on;
    
# Compression level (1-9)
gzip_comp_level 6;

# MIME types to compress
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/rss+xml;

# Compress files larger than this size (default is 20 bytes)
gzip_min_length 1000;

# Disable gzip for certain browsers (optional)
gzip_disable "msie6";

# Additional settings for better performance and compatibility
gzip_proxied any;
gzip_vary on;