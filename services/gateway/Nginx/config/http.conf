include mime.types;
default_type application/octet-stream;
lua_package_path '~/lua/?.lua;;';
lua_shared_dict discovery 10m;
lua_shared_dict jwks 10m;

sendfile off;
gzip on;
    
# Compression level (1-9)
gzip_comp_level 6;

# MIME types to compress
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/rss+xml;

# Compress files larger than this size (default is 20 bytes)
gzip_min_length 1000;

# Disable gzip for certain browsers (optional)
gzip_disable "msie6";

# Additional settings for better performance and compatibility
gzip_proxied any;
gzip_vary on;
proxy_buffer_size 128k;
proxy_buffers 4 256k;
proxy_busy_buffers_size 256k;

keepalive_timeout 65;
keepalive_requests 100;
proxy_read_timeout 300;
proxy_connect_timeout 300;


 map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }