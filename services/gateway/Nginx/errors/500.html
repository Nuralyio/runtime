<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 - Server Error | Nuraly</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --color-bg: #f8fafc;
      --color-bg-secondary: #f1f5f9;
      --color-text: #0f0f3c;
      --color-text-secondary: #5c5c7a;
      --color-text-muted: #8c8ca8;
      --color-border: #e8e8f0;
      --color-border-dashed: #d8d8e4;
      --color-primary: #14144b;
      --color-primary-light: #1e1e6e;
      --color-primary-dark: #0a0a32;
      --color-primary-bg: #f0f0f8;
      --color-accent: #14144b;
      --color-accent-hover: #1e1e6e;
      --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace;
      --transition: 150ms ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 24px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-radius: 0;
      text-decoration: none;
      cursor: pointer;
      transition: all var(--transition);
      border: 2px solid transparent;
      font-family: var(--font-mono);
    }

    .btn-primary {
      background: var(--color-text);
      color: white;
      border-color: var(--color-text);
    }

    .btn-primary:hover {
      background: var(--color-text-secondary);
      border-color: var(--color-text-secondary);
    }

    .btn-secondary {
      background: transparent;
      color: var(--color-text);
      border-color: var(--color-text);
    }

    .btn-secondary:hover {
      background: var(--color-text);
      color: white;
    }

    /* Error Content */
    .error-content {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 24px 80px;
    }

    .error-inner {
      text-align: center;
      max-width: 560px;
    }

    .error-code {
      font-size: clamp(100px, 15vw, 180px);
      font-weight: 700;
      color: var(--color-primary);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 600;
      color: var(--color-text);
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .error-message {
      font-size: 16px;
      color: var(--color-text-secondary);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Footer */
    .home-footer {
      background: #0a0a32;
      color: var(--color-text-muted);
      padding: 32px 0;
    }

    .home-footer a {
      color: #8888b0;
      text-decoration: none;
      transition: color var(--transition);
    }

    .home-footer a:hover {
      color: white;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .footer-brand .logo-text {
      color: white;
      font-size: 18px;
    }

    .footer-copyright {
      font-size: 14px;
      color: #6666a0;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .footer-inner {
        flex-direction: column;
        gap: 24px;
        text-align: center;
      }

      .error-actions {
        flex-direction: column;
        align-items: center;
      }

      .error-actions .btn {
        width: 100%;
        max-width: 280px;
      }
    }

    /* Animation */
    .fade-in {
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <!-- Error Content -->
  <main class="error-content">
    <div class="error-inner fade-in">
      <div class="error-code">500</div>
      <h1 class="error-title">Internal Server Error</h1>
      <p class="error-message">
        Something went wrong on our end. Our team has been notified and is working to fix the issue.
        Please try again in a few moments.
      </p>
      <div class="error-actions">
        <a href="/" class="btn btn-primary">GO TO HOMEPAGE</a>
        <a href="javascript:location.reload()" class="btn btn-secondary">TRY AGAIN</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="home-footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <span class="logo-text">Nuraly</span>
        </div>

        <p class="footer-copyright">&copy; Nuraly</p>
      </div>
    </div>
  </footer>
</body>
</html>
