
worker_processes 1;

error_log  logs/error.log;
error_log  logs/error.log  notice;
error_log logs/error.log info;


include config/env-vars.conf;

include config/events.conf;


http {
    include config/http.conf;

    include config/upstreams/fully-env-upstreams.conf;

    # Main server block for direct access (localhost, main domain)
    server {
        listen 80;
        server_name localhost;

        # Variables for Lua subdomain routing
        set $app_id "";
        set $page_id "";

        include config/redis.conf;

        include locations/locations.conf;

    }

    # Wildcard subdomain server block
    # Uses MAIN_DOMAIN env var for production domains (defaults to localhost)
    server {
        listen 80;
        server_name ~^(?<subdomain>[^.]+)\..+$;

        # Variables for Lua subdomain routing
        set $app_id "";
        set $page_id "";

        include config/redis.conf;

        # Vite/Astro dev assets - proxy directly to frontend (must be before catch-all)
        location ~ ^/@(id|vite|fs|react-refresh)/ {
            proxy_pass http://front;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Node modules and other dev paths
        location ~ ^/node_modules/ {
            proxy_pass http://front;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Vite HMR WebSocket
        location /__vite_hmr {
            proxy_pass http://front;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        # Static assets with file extensions - proxy to frontend
        location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map|json)$ {
            proxy_pass http://front;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API routes - proxy to backend (include at server level, not nested)
        include locations/backend.conf;

        # Auth routes - proxy to keycloak
        location /auth {
            proxy_pass http://keycloak-server;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Scheme $scheme;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            set $target_scheme '';

            access_by_lua_block {
                local host = os.getenv("KC_HOSTNAME")
                if host == "localhost" then
                    ngx.var.target_scheme = "http"
                else
                    ngx.var.target_scheme = "https"
                end
            }

            proxy_set_header X-Forwarded-Proto $target_scheme;
            client_max_body_size 0;
        }

        # Callback route
        location /cb {
            access_by_lua_block {
                require("main").authenticateWithKeycloak()
            }
            proxy_pass http://keycloak-server;
        }

        # Astro assets
        location /_astro {
            proxy_pass http://front;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Favicon
        location /favicon {
            proxy_pass http://front;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Catch-all for subdomain routing - handles both root and page paths
        location / {
            default_type 'text/html';

            access_by_lua_block {
                -- Use the shared Lua module for subdomain handling
                local main = require("main")

                -- handleSubdomainRouting returns true if it handled the request
                -- (either redirected or returned an error)
                -- If false, fall through to proxy_pass
                if main.handleSubdomainRouting() then
                    return
                end
            }

            # Fallback if no subdomain routing needed
            proxy_pass http://front;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}