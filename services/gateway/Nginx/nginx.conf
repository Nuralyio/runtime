# cat /usr/local/openresty/nginx/conf/nginx.conf
# nginx.conf  --  docker-openresty
#
# This file is installed to:
#   `/usr/local/openresty/nginx/conf/nginx.conf`
# and is the file loaded by nginx at startup,
# unless the user specifies otherwise.
#
# It tracks the upstream OpenResty's `nginx.conf`, but removes the `server`
# section and adds this directive:
#     `include /etc/nginx/conf.d/*.conf;`
#
# The `docker-openresty` file `nginx.vh.default.conf` is copied to
# `/etc/nginx/conf.d/default.conf`.  It contains the `server section
# of the upstream `nginx.conf`.
#
# See https://github.com/openresty/docker-openresty/blob/master/README.md#nginx-config-files
#

#user  nobody;
worker_processes 1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
error_log logs/error.log info;

#pid        logs/nginx.pid;

env KEYCLOAK_HOST;
env KEYCLOAK_REALM;
env KEYCLOAK_CLIENT_ID;
env KEYCLOAK_CLIENT_SECRET;
env KEYCLOAK_SCHEME;
env KC_HOSTNAME;


events {
}


http {
    include mime.types;
    default_type application/octet-stream;
    lua_package_path '~/lua/?.lua;;';
    lua_shared_dict discovery 1m;
    large_client_header_buffers 4 16k;
    lua_shared_dict jwks 1m;
    sendfile off;
    resolver   172.31.0.2 local=on;

    upstream front {
        server nuraly_frontend:4321;
    }

    upstream redis_server {
        server ec2-35-158-240-11.eu-central-1.compute.amazonaws.com;
    }

    upstream web-api {
        server nuraly_services.gateway.local:8081;
    }
    upstream keycloak_server {
        server ec2-35-158-240-11.eu-central-1.compute.amazonaws.com:8080;
    }

    server {
        listen 80;

        server_name ~^(?<subdomain>.+)\.localhost localhost;
     
        # remove redis for now
        set $session_storage redis_server;
        set $session_redis_prefix sessions;
        set $session_redis_host redis;
        set $session_redis_port 6379;
        set $session_redis_uselocking off;

          ################ Enabling Gzip ################
        gzip on;
        gzip_disable "MSIE [1-6]\.(?!.*SV1)";
        gzip_vary on;
        gzip_comp_level 7;
        gzip_proxied any;
        gzip_types text/plain text/css text/javascript image/svg+xml image/x-icon application/javascript application/x-javascript text/xml application/xml application/xml+rss application/json;

        location /auth {
            resolver   172.31.0.2 8.8.8.8 local=on;
            proxy_pass http://ec2-35-158-240-11.eu-central-1.compute.amazonaws.com:8080;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Scheme $scheme;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            set $target_scheme '';

            access_by_lua_block {
                local host = os.getenv("KC_HOSTNAME")
                ngx.log(ngx.INFO, host)
                if host == "localhost" then
                ngx.var.target_scheme = "http"
                else
                ngx.var.target_scheme = "https"
                end
            }

            proxy_set_header X-Forwarded-Proto $target_scheme;
            client_max_body_size 0;

        }

        location /api {
             resolver  172.31.0.2 local=on;
            set $api_dns http://nuraly_services.gateway.local:8081;
            access_by_lua_block {
                require("main").authenticateWithKeycloakPass(nil)

            }
            proxy_pass $api_dns;
            proxy_redirect off;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }
            set $backend "http://front:80$request_uri";

        location / {
            resolver  172.31.0.2 local=on;

            set $frontend_dns http://nuraly_frontend.gateway.local:4321;
            default_type 'text/html';
            set $target "";
            proxy_pass $frontend_dns;
            proxy_buffering off;
            proxy_redirect off;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_http_version 1.1;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout       5s;
            proxy_read_timeout          60s;
        }

        location /app/view {

            resolver  172.31.0.2 local=on;
            set $frontend_dns http://nuraly_frontend.gateway.local:4321/app/view/;

            default_type 'text/html';
            set $escaped_query2 $1$is_args$args;
            set $redirect_uri "";
            set $new_request_uri "";

            access_by_lua_block {
                require("main").authenticateWithKeycloakPass(nil);
            }

            proxy_pass $frontend_dns;
            proxy_redirect off;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_http_version 1.1;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /app {
            resolver  172.31.0.2 local=on;
            set $frontend_dn_s "http://nuraly_frontend.gateway.local:4321$request_uri";

            default_type 'text/html';
            proxy_buffering off;
            access_by_lua_block {
                require("main").authenticateWithKeycloak()
            }
            proxy_connect_timeout 65s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            set $escaped_query $1$is_args$args;
            proxy_pass $frontend_dn_s;
            proxy_redirect off;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_http_version 1.1;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /get-user-info {
            set $user_ids_to_retrieve "";
            content_by_lua_block {
                ngx.req.read_body()
                local post_data = ngx.req.get_body_data()
                ngx.var.user_ids_to_retrieve = post_data
                require("userinfo")
            }

        }

        location /apps {
            resolver  172.31.0.2 local=on;

            set $frontend_dns http://nuraly_frontend.gateway.local:4321/apps;
            default_type 'text/html';

            access_by_lua_block {
                require("main").authenticateWithKeycloak()
            }

            set $escaped_query $1$is_args$args;
            proxy_pass $frontend_dns;
            proxy_redirect off;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            proxy_http_version 1.1;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /cb {
            access_by_lua_block {
                require("main").authenticateWithKeycloak()
            }
            proxy_pass http://keycloak_server;
        }

        location ~* ^/@ {
            proxy_pass http://front$request_uri;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|webp)$ {
            expires 365d;
        }


    }
    include /etc/nginx/conf.d/*.conf;
}
