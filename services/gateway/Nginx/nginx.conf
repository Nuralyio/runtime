# cat /usr/local/openresty/nginx/conf/nginx.conf
# nginx.conf  --  docker-openresty
#
# This file is installed to:
#   `/usr/local/openresty/nginx/conf/nginx.conf`
# and is the file loaded by nginx at startup,
# unless the user specifies otherwise.
#
# It tracks the upstream OpenResty's `nginx.conf`, but removes the `server`
# section and adds this directive:
#     `include /etc/nginx/conf.d/*.conf;`
#
# The `docker-openresty` file `nginx.vh.default.conf` is copied to
# `/etc/nginx/conf.d/default.conf`.  It contains the `server section
# of the upstream `nginx.conf`.
#
# See https://github.com/openresty/docker-openresty/blob/master/README.md#nginx-config-files
#

#user  nobody;
worker_processes 1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
error_log logs/error.log info;

#pid        logs/nginx.pid;

env KEYCLOAK_HOST;
env KEYCLOAK_REALM;
env KEYCLOAK_CLIENT_ID;
env KEYCLOAK_CLIENT_SECRET;
env KEYCLOAK_SCHEME;


events {
    worker_connections 1024;
}


http {
    include mime.types;
    default_type application/octet-stream;
  lua_package_path '~/lua/?.lua;;';
  lua_shared_dict discovery 1m;

  # cache for JWKs
  lua_shared_dict jwks 1m;
    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';
    #access_log  logs/access.log  main;
    sendfile on;
    #tcp_nopush     on;



    upstream front {
        server host.docker.internal:4321;

    }

    upstream web-api {
        server host.docker.internal:8081;
    }

    server {
        listen 80;
        server_name learn.localhost;

        location / {
            proxy_pass http://learn;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
    
    server {
        listen 80;

        server_name ~^(?<subdomain>.+)\.localhost localhost;
        resolver local=on ipv6=off;
        set $session_storage redis;
        set $session_redis_prefix sessions;
        set $session_redis_host redis;
        set $session_redis_port 6379;
        set $session_redis_uselocking off;

        location /auth {
            
            proxy_pass http://keycloak:8080;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Scheme $scheme;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            set $target_scheme '';

            access_by_lua_block {
                local host = os.getenv("KC_HOSTNAME")
                if host == "localhost" then
                ngx.var.target_scheme = "http"
                else
                ngx.var.target_scheme = "https"
                end
            }

            proxy_set_header X-Forwarded-Proto $target_scheme;
            client_max_body_size 0;

        }

        location /api {
            access_by_lua_block {
                require("main").authenticateWithKeycloakPass()
                
            }   
            proxy_pass http://web-api;
            proxy_redirect off;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }
      
        
 
        location / {

            default_type 'text/html';
            set $escaped_query $1$is_args$args;
            set $target "";
            access_by_lua_block {
                require("main").authenticateWithKeycloakPass();

                local subdomain = ngx.var.subdomain

                if subdomain == nil or subdomain == "" then
                    -- No subdomain, proxy pass to http://front
                    ngx.var.target="http://front/";
                else
                    -- Subdomain detected, construct the target URL
                    ngx.var.target="http://nginx/app/view/" .. subdomain .. ngx.var.request_uri;
                    local http = require("resty.http")
                    local httpc = http.new()
                    
                    -- Combine the URI and query parameters
                    local uri_with_query = ngx.var.http_referer

                    local request_uri = ngx.var.request_uri
                    local isFileRequest = string.match(request_uri, "%.([a-zA-Z0-9]+)$")
                    if not isFileRequest then
                        -- Define the JSON payload

                        local json_payload = '{"url":"' .. ngx.var.escaped_query .. ngx.var.request_uri .. '"}'
                            ngx.log(ngx.ERR, json_payload)
                        
                        -- Make a POST request to /api/applications/check-auth
                        local res, err = httpc:request_uri("http://nginx/api/applications/check-auth", {
                            method = "POST",
                            body = json_payload,
                            headers = {
                                ["Content-Type"] = "application/json"
                            }
                        })

                        if not res then
                            ngx.log(ngx.ERR, "Failed to make request to check-auth API: ", err)
                            ngx.exit(ngx.HTTP_INTERNAL_SERVER_ERROR)
                            return
                        end
                            ngx.log(ngx.ERR, "HOSSSTTT ", ngx.var.request_uri)

                        -- Check the response and execute the appropriate authentication function
                        if res.status == 200 and res.body == "true" then
                            ngx.log(ngx.INFO, "Acces without Auth: ")

                            require("main").authenticateWithKeycloak()
                        else
                            ngx.log(ngx.INFO, "Acces with Auth: ")

                            require("main").authenticateWithKeycloakPass(subdomain..".localhost")
                        end
                    end
                end
            }

            proxy_redirect off;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            
            proxy_http_version 1.1;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass $target;

        }

        location /app/view {
            set $escaped_query2 $1$is_args$args;
            set $redirect_uri "";
            set $new_request_uri "";

              access_by_lua_block {
                require("main").authenticateWithKeycloakPass();
            }  
            default_type 'text/html';
            proxy_pass http://front/app/view/;
            proxy_redirect off;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            proxy_http_version 1.1;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /app {
             access_by_lua_block {
                require("main").authenticateWithKeycloak()
                
            }   
            default_type 'text/html';
            set $escaped_query $1$is_args$args;
            proxy_pass http://front/app;
            proxy_redirect off;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            proxy_http_version 1.1;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /apps {
            default_type 'text/html';

            access_by_lua_block {
                require("main").authenticateWithKeycloak()
            } 
            set $escaped_query $1$is_args$args;
            proxy_pass http://front/apps;
            proxy_redirect off;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            proxy_http_version 1.1;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

         location /cb {
             access_by_lua_block {
                require("main").authenticateWithKeycloak()
            }
               
            proxy_pass http://keycloak:8080; 
        }
        location ~* ^/@ {
            proxy_pass http://front$request_uri;
        }
        location ~* ^(?!/(api|auth)/).*\.(css|js|astro|svg|mjs|ts)$ {
            proxy_pass http://front$request_uri;
        }

    }
    #gzip  on;

    include /etc/nginx/conf.d/*.conf;
}
