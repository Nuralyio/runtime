location /api/v1/workflows {
    set $x_user "";
    access_by_lua_block {
        require("main").authenticateWithKeycloakPass(nil)
        -- Read X-USER header set by authenticateWithKeycloakPass
        -- Note: $http_x_user doesn't work because it reads from original client headers
        ngx.var.x_user = ngx.req.get_headers()["X-USER"] or ""
    }
    proxy_pass http://workflows-api/api/v1/workflows;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_set_header X-USER $x_user;
}

