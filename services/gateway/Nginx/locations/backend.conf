# Public endpoint for checking anonymous access (no auth required)
location ~ ^/api/resources/[^/]+/[^/]+/check-anonymous$ {
    proxy_pass http://services-api;
    proxy_redirect off;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection keep-alive;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
}

# Pages API with optional anonymous access (for preview mode)
location ~ ^/api/pages/application/([^/]+)$ {
    set $app_id $1;

    access_by_lua_block {
        require("main").authenticateWithOptionalAnonymous("application", ngx.var.app_id, ngx.var.app_id)
    }

    proxy_pass http://services-api;
    proxy_redirect off;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header Upgrade $http_upgrade;
