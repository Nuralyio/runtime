# Subdomain-based application routing
# Handles requests like: myapp.localhost, dashboard.example.com
# Routes to /app/preview/{applicationId}/{pageUrl}
#
# Uses the shared Lua module (main.lua) for:
# - Subdomain extraction and validation
# - Application resolution via API
# - Permission checking with anonymous access support
# - URL encoding for safe redirects

# Extract subdomain from Host header and route to application
location / {
    default_type 'text/html';

    # Use Lua to handle subdomain routing via shared module
    access_by_lua_block {
        local main = require("main")

        -- handleSubdomainRouting returns true if it handled the request
        -- (either redirected or returned an error)
        -- If false, fall through to proxy_pass
        if main.handleSubdomainRouting() then
            return
        end
    }

    # Fallback if no subdomain routing needed
    proxy_pass http://front;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}
