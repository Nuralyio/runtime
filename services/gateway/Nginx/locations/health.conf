# Health check endpoints - no authentication required

location = /health {
    return 200 '{"status":"UP"}';
    add_header Content-Type application/json;
}

location = /api/v1/functions/health {
    proxy_pass http://functions-api/q/health;
    proxy_connect_timeout 3s;
    proxy_read_timeout 3s;
}

location = /api/v1/workflows/health {
    proxy_pass http://workflows-api/q/health;
    proxy_connect_timeout 3s;
    proxy_read_timeout 3s;
}

location = /api/v1/kv/health {
    proxy_pass http://kv-api/q/health;
    proxy_connect_timeout 3s;
    proxy_read_timeout 3s;
}

location = /api/v1/db/health {
    proxy_pass http://conduit-api/q/health;
    proxy_connect_timeout 3s;
    proxy_read_timeout 3s;
}

location = /api/v1/logs/health {
    proxy_pass http://journal-api/q/health;
    proxy_connect_timeout 3s;
    proxy_read_timeout 3s;
}

location = /api/v1/ocr/health {
    proxy_pass http://textlens-api/health;
    proxy_connect_timeout 3s;
    proxy_read_timeout 3s;
}

location = /api/v1/crawler/health {
    proxy_pass http://parcour-api/q/health;
    proxy_connect_timeout 3s;
    proxy_read_timeout 3s;
}
