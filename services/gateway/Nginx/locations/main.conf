
###
# the default main location block
# this block is used to proxy all requests to the front service
# the front service is the service that serves the front end of the application
###

location / {
    default_type 'text/html';
    set $escaped_query $1$is_args$args;
    set $target "";
    proxy_buffering off;
    proxy_redirect off;
    proxy_connect_timeout 65s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_http_version 1.1;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://front/;
}


location ~* ^/@ {
    proxy_pass http://front$request_uri;
}
