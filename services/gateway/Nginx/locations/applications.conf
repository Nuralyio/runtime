location /app/view {
    default_type 'text/html';
    set $redirect_uri "";
    set $new_request_uri "";

    access_by_lua_block {
        --- @todo: remove this after fixing the roles issue
        --- require("main").authenticateWithKeycloakPass(nil);
    }

    proxy_pass http://front/app/view/;
    proxy_redirect off;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_http_version 1.1;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# Preview route with optional authentication (supports anonymous access)
# Checks both page-level AND application-level anonymous access
location ~ ^/app/preview/([^/]+)/([^/]+) {
    default_type 'text/html';
    set $app_id $1;
    set $page_id $2;

    access_by_lua_block {
        require("main").authenticateWithOptionalAnonymous("page", ngx.var.page_id, ngx.var.app_id)
    }

    proxy_pass http://front/app/preview/$app_id/$page_id;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_set_header X-USER $http_x_user;
}

location /app {
    default_type 'text/html';
    access_by_lua_block {
        require("main").authenticateWithKeycloak()
    }
    proxy_pass http://front/app;
     proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
}

location /dashboard {
    default_type 'text/html';

    access_by_lua_block {
        require("main").authenticateWithKeycloak()
    }

    proxy_pass http://front/dashboard;
    proxy_redirect off;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;

    proxy_http_version 1.1;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}