<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a32"/>
      <stop offset="50%" style="stop-color:#14144b"/>
      <stop offset="100%" style="stop-color:#0f0f3c"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e6e;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#2a2a8a;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="wave2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3535a0;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1e1e6e;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4ac0;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#2a2a8a;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Abstract flowing shapes -->
  <ellipse cx="200" cy="300" rx="400" ry="250" fill="url(#wave1)" filter="url(#blur1)" opacity="0.7"/>
  <ellipse cx="600" cy="800" rx="450" ry="300" fill="url(#wave2)" filter="url(#blur2)" opacity="0.6"/>
  <ellipse cx="100" cy="900" rx="350" ry="400" fill="url(#accent1)" filter="url(#blur1)" opacity="0.5"/>
  <ellipse cx="700" cy="200" rx="300" ry="250" fill="url(#wave1)" filter="url(#blur2)" opacity="0.4"/>

  <!-- Accent circles -->
  <circle cx="150" cy="150" r="200" fill="#2a2a8a" filter="url(#blur3)" opacity="0.3"/>
  <circle cx="650" cy="500" r="250" fill="#1e1e6e" filter="url(#blur1)" opacity="0.4"/>
  <circle cx="400" cy="1000" r="300" fill="#3535a0" filter="url(#blur2)" opacity="0.25"/>

  <!-- Subtle geometric lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="400" x2="800" y2="300"/>
    <line x1="0" y1="600" x2="800" y2="500"/>
    <line x1="0" y1="800" x2="800" y2="700"/>
    <line x1="200" y1="0" x2="300" y2="1200"/>
    <line x1="500" y1="0" x2="600" y2="1200"/>
  </g>

  <!-- Small accent dots -->
  <g fill="#ffffff" opacity="0.1">
    <circle cx="100" cy="200" r="3"/>
    <circle cx="300" cy="400" r="2"/>
    <circle cx="500" cy="150" r="4"/>
    <circle cx="700" cy="350" r="2"/>
    <circle cx="200" cy="700" r="3"/>
    <circle cx="600" cy="900" r="2"/>
    <circle cx="400" cy="600" r="3"/>
    <circle cx="150" cy="1000" r="2"/>
    <circle cx="650" cy="1100" r="3"/>
  </g>
</svg>