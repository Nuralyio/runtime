# HTTP
quarkus.http.port=8080
quarkus.http.cors.origins=*
quarkus.http.cors=true
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# Swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/api/v1/crawler/swagger-ui

# RabbitMQ Configuration
rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
rabbitmq.port=${RABBITMQ_PORT:5672}
rabbitmq.username=${RABBITMQ_USER:guest}
rabbitmq.password=${RABBITMQ_PASS:guest}
rabbitmq.queue=${RABBITMQ_QUEUE:crawl-requests}

# Browserless Configuration (optional, for JS rendering)
browserless.url=${BROWSERLESS_URL:}

# Crawler Settings
crawler.timeout-seconds=30
crawler.delay-ms=500
crawler.user-agent=NuralyBot/1.0 (+https://nuraly.io)
crawler.default-remove-selectors=nav,footer,header,script,style,noscript,iframe,aside

# SSRF Protection
crawler.block-private-ips=true
crawler.block-localhost=true
crawler.allowed-schemes=http,https

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.nuraly.crawler".level=DEBUG

# Health checks
quarkus.smallrye-health.root-path=/health
