badgeFields:
  container:
    uuid: badge_fields_collapse_container
    name: Badge Fields Container
    style: {}

  collapse:
    uuid: badge_fields_collapse
    title: Badge Properties
    style:
      --hy-collapse-content-small-size-padding: 5px
      --hy-collapse-font-weight: normal
      --hy-collapse-border-radius: 0px
      --hy-collapse-width: 292px
      --hy-collapse-border: none
      --hy-collapse-border-bottom: 1px solid #ccc
      --hy-collapse-local-header-background-color: '#3d3d3d'

  properties:
    - name: count
      label: Count
      type: number
      default: '0'
      width: 80px
      placeholder: 0
      valueHandler:
        ref: componentInput
        params: [count]
      stateHandler:
        ref: inputHandler
        params: [count]
      eventHandlers:
        onChange:
          ref: updateInput
          params: [count, number]

    - name: text
      label: Text
      type: text
      default: ''
      width: 180px
      placeholder: Badge text
      valueHandler:
        ref: componentInput
        params: [text]
      stateHandler:
        ref: inputHandler
        params: [text]
      eventHandlers:
        valueChange:
          ref: updateInput
          params: [text, string]

    - name: dot
      label: Dot Badge
      type: radio
      default: false
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        let currentValue = false;
        let isDisabled = false;
        if (selectedComponent?.input?.dot?.type == 'handler' && selectedComponent?.input?.dot?.value) {
          isDisabled = true;
        } else {
          currentValue = selectedComponent?.input?.dot?.value || false;
        }
        const options = [
          { value: false, icon: 'toggle-off', disabled: isDisabled },
          { value: true, icon: 'toggle-on', disabled: isDisabled }
        ];
        const radioType = 'button';
        return [options, currentValue, radioType];
      eventHandlers:
        changed: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (selectedComponent) {
            updateInput(selectedComponent, 'dot', 'boolean', EventData.value);
          }

    - name: showZero
      label: Show Zero
      type: radio
      default: false
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
