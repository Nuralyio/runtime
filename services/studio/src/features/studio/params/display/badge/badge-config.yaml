        let isDisabled = false;
        if (selectedComponent?.input?.showZero?.type == 'handler' && selectedComponent?.input?.showZero?.value) {
          isDisabled = true;
        } else {
          currentValue = selectedComponent?.input?.showZero?.value || false;
        }
        const options = [
          { value: false, icon: 'toggle-off', disabled: isDisabled },
          { value: true, icon: 'toggle-on', disabled: isDisabled }
        ];
        const radioType = 'button';
        return [options, currentValue, radioType];
      eventHandlers:
        changed: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (selectedComponent) {
            updateInput(selectedComponent, 'showZero', 'boolean', EventData.value);
          }

    - name: overflowCount
      label: Overflow Count
      type: number
      default: '99'
      width: 80px
      placeholder: 99
      valueHandler:
        ref: componentInput
        params: [overflowCount]
      stateHandler:
        ref: inputHandler
        params: [overflowCount]
      eventHandlers:
        onChange:
          ref: updateInput
          params: [overflowCount, number]

    - name: size
