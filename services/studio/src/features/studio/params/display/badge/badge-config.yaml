          }

    - name: color
      label: Color
      type: radio
      default: ''
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        let currentColor = '';
        let isDisabled = false;
        if (selectedComponent?.input?.color?.type == 'handler' && selectedComponent?.input?.color?.value) {
          isDisabled = true;
        } else {
          currentColor = selectedComponent?.input?.color?.value || '';
        }
        const options = [
          { value: '', label: 'Default', disabled: isDisabled },
          { value: 'primary', label: 'Primary', disabled: isDisabled },
          { value: 'success', label: 'Success', disabled: isDisabled },
