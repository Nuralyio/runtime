sliderFields:
  container:
    uuid: slider_fields_collapse_container
    name: Slider Fields Container
    style: {}

  collapse:
    uuid: slider_fields_collapse
    title: Slider Properties
    style:
      --hy-collapse-content-small-size-padding: 5px
      --hy-collapse-font-weight: normal
      --hy-collapse-border-radius: 0px
      --hy-collapse-width: 292px
      --hy-collapse-border: none
      --hy-collapse-border-bottom: 1px solid #ccc
      --hy-collapse-local-header-background-color: '#3d3d3d'

  properties:
    - name: min
      label: Minimum
      type: number
      default: '0'
      width: 80px
      placeholder: 0
      valueHandler:
        ref: componentInput
        params: [min]
      stateHandler:
        ref: inputHandler
        params: [min]
      eventHandlers:
        onChange:
          ref: updateInput
          params: [min, number]

    - name: max
      label: Maximum
      type: number
      default: '100'
      width: 80px
      placeholder: 100
      valueHandler:
        ref: componentInput
        params: [max]
      stateHandler:
        ref: inputHandler
        params: [max]
      eventHandlers:
        onChange:
          ref: updateInput
          params: [max, number]

    - name: step
      label: Step
      type: number
      default: '1'
      width: 80px
      placeholder: 1
      valueHandler:
        ref: componentInput
        params: [step]
      stateHandler:
        ref: inputHandler
        params: [step]
      eventHandlers:
        onChange:
          ref: updateInput
          params: [step, number]

    - name: disabled
      label: Disabled
      type: radio
      default: false
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        let currentValue = false;
        let isDisabled = false;
        if (selectedComponent?.input?.disabled?.type == 'handler' && selectedComponent?.input?.disabled?.value) {
          isDisabled = true;
        } else {
          currentValue = selectedComponent?.input?.disabled?.value || false;
        }
        const options = [
          { value: false, icon: 'toggle-off', disabled: isDisabled },
          { value: true, icon: 'toggle-on', disabled: isDisabled }
        ];
        const radioType = 'button';
        return [options, currentValue, radioType];
      eventHandlers:
        changed: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (selectedComponent) {
            updateInput(selectedComponent, 'disabled', 'boolean', EventData.value);
          }

    - name: vertical
      label: Vertical
      type: radio
      default: false
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        let currentValue = false;
        let isDisabled = false;
        if (selectedComponent?.input?.vertical?.type == 'handler' && selectedComponent?.input?.vertical?.value) {
          isDisabled = true;
        } else {
          currentValue = selectedComponent?.input?.vertical?.value || false;
        }
        const options = [
          { value: false, icon: 'toggle-off', disabled: isDisabled },
          { value: true, icon: 'toggle-on', disabled: isDisabled }
        ];
        const radioType = 'button';
        return [options, currentValue, radioType];
      eventHandlers:
        changed: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (selectedComponent) {
            updateInput(selectedComponent, 'vertical', 'boolean', EventData.value);
          }

    - name: showTooltip
      label: Show Tooltip
      type: radio
      default: true
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        let currentValue = true;
        let isDisabled = false;
        if (selectedComponent?.input?.showTooltip?.type == 'handler' && selectedComponent?.input?.showTooltip?.value) {
          isDisabled = true;
        } else {
          currentValue = selectedComponent?.input?.showTooltip?.value !== false;
        }
        const options = [
          { value: false, icon: 'toggle-off', disabled: isDisabled },
          { value: true, icon: 'toggle-on', disabled: isDisabled }
        ];
        const radioType = 'button';
        return [options, currentValue, radioType];
      eventHandlers:
        changed: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (selectedComponent) {
            updateInput(selectedComponent, 'showTooltip', 'boolean', EventData.value);
          }

    - name: showMarks
      label: Show Marks
      type: radio
      default: false
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        let currentValue = false;
        let isDisabled = false;
        if (selectedComponent?.input?.showMarks?.type == 'handler' && selectedComponent?.input?.showMarks?.value) {
          isDisabled = true;
        } else {
          currentValue = selectedComponent?.input?.showMarks?.value || false;
        }
        const options = [
          { value: false, icon: 'toggle-off', disabled: isDisabled },
          { value: true, icon: 'toggle-on', disabled: isDisabled }
        ];
        const radioType = 'button';
        return [options, currentValue, radioType];
      eventHandlers:
        changed: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (selectedComponent) {
            updateInput(selectedComponent, 'showMarks', 'boolean', EventData.value);
          }

    - name: range
      label: Range Mode
      type: radio
      default: false
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        let currentValue = false;
        let isDisabled = false;
        if (selectedComponent?.input?.range?.type == 'handler' && selectedComponent?.input?.range?.value) {
          isDisabled = true;
        } else {
          currentValue = selectedComponent?.input?.range?.value || false;
        }
        const options = [
          { value: false, icon: 'toggle-off', disabled: isDisabled },
          { value: true, icon: 'toggle-on', disabled: isDisabled }
        ];
        const radioType = 'button';
        return [options, currentValue, radioType];
      eventHandlers:
        changed: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (selectedComponent) {
            updateInput(selectedComponent, 'range', 'boolean', EventData.value);
          }

    - name: marks
      label: Marks
      type: text
      default: ''
      width: 180px
      placeholder: 'e.g., {0: "Min", 50: "Mid", 100: "Max"}'
      hasHandler: true
      handlerType: input
      handlerProperty: marks
      handlerValueGetter: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        return selectedComponent?.inputHandlers?.marks || '';
      handlerEventUpdate: |
        updateInputHandlers(Utils.first(Vars.selectedComponents), 'marks', EventData.value);
