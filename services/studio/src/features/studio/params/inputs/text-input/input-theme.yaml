- name: Dark Mode
  open: true
  items:
    - name: General
      items:
        - label: Background Color
          cssVar: --nuraly-input-background-color
          type: color

        - label: Text Color
          cssVar: --nuraly-input-text-color
          type: color

        - label: Font Family
          cssVar: --nuraly-input-font-family
          type: select
          defaultValue: inherit
          options:
            - label: System Default
              value: inherit
            - label: Arial
              value: Arial, sans-serif
            - label: Helvetica
              value: Helvetica, sans-serif
            - label: Times New Roman
              value: "'Times New Roman', serif"
            - label: Georgia
              value: Georgia, serif
            - label: Courier New
              value: "'Courier New', monospace"
            - label: Monaco
              value: Monaco, monospace
            - label: Verdana
              value: Verdana, sans-serif
            - label: Roboto
              value: Roboto, sans-serif
            - label: Inter
              value: Inter, sans-serif
            - label: Poppins
              value: Poppins, sans-serif
      open: true

    - name: Disabled State
      items:
        - label: Disabled Background Color
          cssVar: --nuraly-input-disabled-background-color
          type: color

        - label: Disabled Placeholder Color
          cssVar: --nuraly-input-disabled-placeholder-color
          type: color

        - label: Disabled Helper Text Color
          cssVar: --nuraly-input-disabled-helper-text-color
          type: color

        - label: Disabled Label Color
          cssVar: --nuraly-input-disabled-label-color
          type: color

        - label: Disabled Icon Opacity
          cssVar: --nuraly-input-disabled-icon-opacity
          type: number
          placeholder: 0-1
          defaultValue: '0.5'

        - label: Disabled Border Bottom
          cssVar: --nuraly-input-disabled-border-bottom
          type: text
          placeholder: e.g., 1px solid #ccc

        - label: Disabled Border Top
          cssVar: --nuraly-input-disabled-border-top
          type: text
          placeholder: e.g., 1px solid #ccc

        - label: Disabled Border Left
          cssVar: --nuraly-input-disabled-border-left
          type: text
          placeholder: e.g., 1px solid #ccc

        - label: Disabled Border Right
          cssVar: --nuraly-input-disabled-border-right
          type: text
          placeholder: e.g., 1px solid #ccc
      open: true

    - name: 'State: Error'
      items:
        - label: Error Border
          cssVar: --nuraly-input-error-border

        - label: Error Helper Text Color
          cssVar: --nuraly-input-error-helper-text-color

        - label: Error Icon Color
          cssVar: --nuraly-input-error-icon-color
      open: true

    - name: 'State: Warning'
      items:
        - label: Warning Helper Text Color
          cssVar: --nuraly-input-warning-helper-text-color

        - label: Warning Icon Color
          cssVar: --nuraly-input-warning-icon-color
      open: true

    - name: Placeholder
      items:
        - label: Placeholder Color
          cssVar: --nuraly-input-placeholder-color
      open: false

    - name: Focus State
      items:
        - label: Focus Border
          cssVar: --nuraly-input-focus-border
      open: false

    - name: Icons
      items:
        - label: Warning Icon Color
          cssVar: --nuraly-input-warning-icon-color

        - label: Error Icon Color
          cssVar: --nuraly-input-error-icon-color

        - label: Calendar Icon Color
          cssVar: --nuraly-input-calendar-icon-color

        - label: Password Icon Color
          cssVar: --nuraly-input-password-icon-color

        - label: Copy Icon Color
          cssVar: --nuraly-input-copy-icon-color

        - label: Number Icons Color
          cssVar: --nuraly-input-number-icons-color

        - label: Number Icons Separator Color
          cssVar: --nuraly-input-number-icons-sperator-color
      open: true

