- name: Textarea Theme
  open: true
  items:
    - name: General
      items:
        - label: Background Color
          cssVar: --textarea-background-color
          type: color

        - label: Text Color
          cssVar: --textarea-text-color
          type: color

        - label: Border Color
          cssVar: --textarea-border-color
          type: color

        - label: Border Radius
          cssVar: --textarea-border-radius
          type: text
          defaultValue: 4px

    - name: Focus State
      items:
        - label: Focus Border Color
          cssVar: --textarea-focus-border-color
          type: color

        - label: Focus Shadow
          cssVar: --textarea-focus-shadow
          type: text

    - name: Disabled State
      items:
        - label: Disabled Background Color
          cssVar: --textarea-disabled-background-color
          type: color

        - label: Disabled Text Color
          cssVar: --textarea-disabled-text-color
          type: color
