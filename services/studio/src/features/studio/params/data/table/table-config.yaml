tableFields:
  container:
    uuid: table_fields_collapse_container
    name: Table Fields Container
    style: {}

  collapse:
    uuid: table_fields_collapse
    title: Table Properties
    style:
      padding: 10px

  properties:
    # Data Configuration
    - name: data
      label: Data Source
      type: text
      default: ''
      width: 180px
      placeholder: Configure data
      hasHandler: true
      handlerType: input
      handlerProperty: data
      handlerValueGetter: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        return selectedComponent?.inputHandlers?.data || '';
      handlerEventUpdate: |
        updateInputHandlers(Utils.first(Vars.selectedComponents), 'data', EventData.value);

    # Table Size
    - name: tableSize
      label: Size
      type: radio
      default: normal
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        let currentSize = '';
        let isDisabled = false;
        if (selectedComponent?.style?.size?.type == 'handler' && selectedComponent?.style?.size?.value) {
          isDisabled = true;
        } else {
          currentSize = selectedComponent?.style?.size || 'normal';
        }
        const options = [
          { value: 'small', label: 'S', disabled: isDisabled },
          { value: 'normal', label: 'M', disabled: isDisabled },
          { value: 'large', label: 'L', disabled: isDisabled }
        ];
        const radioType = 'button';
        return [options, currentSize, radioType];
      eventHandlers:
        changed: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (selectedComponent) {
            updateStyle(selectedComponent, 'size', EventData.value);
          }
      hasHandler: true
      handlerType: style
      handlerProperty: size
      handlerValueGetter: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        return selectedComponent?.styleHandlers?.size || '';
      handlerEventUpdate: |
        updateStyleHandlers(Utils.first(Vars.selectedComponents), 'size', EventData.value);

    # Selection Mode
    - name: selectionMode
      label: Selection
      type: radio
      default: ''
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        let currentMode = '';
        let isDisabled = false;
        if (selectedComponent?.input?.selectionMode?.type == 'handler' && selectedComponent?.input?.selectionMode?.value) {
          isDisabled = true;
        } else {
          currentMode = selectedComponent?.input?.selectionMode?.value || '';
        }
        const options = [
          { value: '', icon: 'ban', disabled: isDisabled },
          { value: 'single', icon: 'check', disabled: isDisabled },
          { value: 'multiple', icon: 'list-check', disabled: isDisabled }
        ];
        const radioType = 'button';
        return [options, currentMode, radioType];
      eventHandlers:
        changed: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (selectedComponent) {
            updateInput(selectedComponent, 'selectionMode', 'string', EventData.value);
          }
      hasHandler: true
      handlerType: input
      handlerProperty: selectionMode
      handlerValueGetter: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        return selectedComponent?.inputHandlers?.selectionMode || '';
      handlerEventUpdate: |
        updateInputHandlers(Utils.first(Vars.selectedComponents), 'selectionMode', EventData.value);

    # Filter
    - name: filter
      label: Filter
      type: radio
      default: ''
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        let currentFilter = '';
        let isDisabled = false;
        if (selectedComponent?.input?.filter?.type == 'handler' && selectedComponent?.input?.filter?.value) {
          isDisabled = true;
        } else {
          currentFilter = selectedComponent?.input?.filter?.value || '';
        }
        const options = [
          { value: '', icon: 'ban', disabled: isDisabled },
          { value: 'filter', icon: 'filter', disabled: isDisabled }
        ];
        const radioType = 'button';
        return [options, currentFilter, radioType];
      eventHandlers:
        changed: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (selectedComponent) {
            updateInput(selectedComponent, 'filter', 'string', EventData.value);
          }
      hasHandler: true
      handlerType: input
      handlerProperty: filter
      handlerValueGetter: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        return selectedComponent?.inputHandlers?.filter || '';
      handlerEventUpdate: |
        updateInputHandlers(Utils.first(Vars.selectedComponents), 'filter', EventData.value);

    # Fixed Header
    - name: fixedHeader
      label: Fixed Header
      type: radio
      default: false
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        let currentValue = false;
        let isDisabled = false;
        if (selectedComponent?.input?.fixedHeader?.type == 'handler' && selectedComponent?.input?.fixedHeader?.value) {
          isDisabled = true;
        } else {
          currentValue = selectedComponent?.input?.fixedHeader?.value || false;
        }
        const options = [
          { value: false, icon: 'toggle-off', disabled: isDisabled },
          { value: true, icon: 'toggle-on', disabled: isDisabled }
        ];
        const radioType = 'button';
        return [options, currentValue, radioType];
      eventHandlers:
        changed: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (selectedComponent) {
            updateInput(selectedComponent, 'fixedHeader', 'boolean', EventData.value);
          }
      hasHandler: true
      handlerType: input
      handlerProperty: fixedHeader
      handlerValueGetter: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        return selectedComponent?.inputHandlers?.fixedHeader || '';
      handlerEventUpdate: |
        updateInputHandlers(Utils.first(Vars.selectedComponents), 'fixedHeader', EventData.value);

    # Expandable
    - name: expandable
      label: Expandable Row
      type: text
      default: ''
      width: 180px
      placeholder: Row property key
      valueHandler:
        ref: componentInput
        params: [expandable]
      stateHandler:
        ref: inputHandler
        params: [expandable]
      eventHandlers:
        valueChange:
          ref: updateInput
          params: [expandable, string]
      hasHandler: true
      handlerType: input
      handlerProperty: expandable
      handlerValueGetter: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        return selectedComponent?.inputHandlers?.expandable || '';
      handlerEventUpdate: |
        updateInputHandlers(Utils.first(Vars.selectedComponents), 'expandable', EventData.value);

    # Loading State
    - name: loading
      label: Loading
      type: radio
      default: false
      width: 180px
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        let currentValue = false;
        let isDisabled = false;
        if (selectedComponent?.input?.loading?.type == 'handler' && selectedComponent?.input?.loading?.value) {
          isDisabled = true;
        } else {
          currentValue = selectedComponent?.input?.loading?.value || false;
        }
        const options = [
          { value: false, icon: 'toggle-off', disabled: isDisabled },
          { value: true, icon: 'toggle-on', disabled: isDisabled }
        ];
        const radioType = 'button';
        return [options, currentValue, radioType];
      eventHandlers:
        changed: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (selectedComponent) {
            updateInput(selectedComponent, 'loading', 'boolean', EventData.value);
          }
      hasHandler: true
      handlerType: input
      handlerProperty: loading
      handlerValueGetter: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        return selectedComponent?.inputHandlers?.loading || '';
      handlerEventUpdate: |
        updateInputHandlers(Utils.first(Vars.selectedComponents), 'loading', EventData.value);

    # Empty Text
    - name: emptyText
      label: Empty Text
      type: text
      default: 'No data available'
      width: 180px
      placeholder: Empty state message
      valueHandler:
        ref: componentInput
        params: [emptyText]
      stateHandler:
        ref: inputHandler
        params: [emptyText]
      eventHandlers:
        valueChange:
          ref: updateInput
          params: [emptyText, string]
      hasHandler: true
      handlerType: input
      handlerProperty: emptyText
      handlerValueGetter: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        return selectedComponent?.inputHandlers?.emptyText || '';
      handlerEventUpdate: |
        updateInputHandlers(Utils.first(Vars.selectedComponents), 'emptyText', EventData.value);

    # Empty Icon
    - name: emptyIcon
      label: Empty Icon
      type: text
      default: ''
      width: 180px
      placeholder: Icon name
      valueHandler:
        ref: componentInput
        params: [emptyIcon]
      stateHandler:
        ref: inputHandler
        params: [emptyIcon]
      eventHandlers:
        valueChange:
          ref: updateInput
          params: [emptyIcon, string]
      hasHandler: true
      handlerType: input
      handlerProperty: emptyIcon
      handlerValueGetter: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        return selectedComponent?.inputHandlers?.emptyIcon || '';
      handlerEventUpdate: |
        updateInputHandlers(Utils.first(Vars.selectedComponents), 'emptyIcon', EventData.value);

    # Scroll Config
    - name: scrollConfigX
      label: Scroll X
      type: number
      default: ''
      width: 80px
      placeholder: width
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        return selectedComponent?.inputHandlers?.scrollConfig?.x || '';
      eventHandlers:
        onChange: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (!selectedComponent) return;
          const currentConfig = selectedComponent?.inputHandlers?.scrollConfig || {};
          const newConfig = { ...currentConfig, x: EventData.value };
          updateInputHandlers(selectedComponent, 'scrollConfig', newConfig);

    - name: scrollConfigY
      label: Scroll Y
      type: number
      default: ''
      width: 80px
      placeholder: height
      valueHandler: |
        const selectedComponent = Utils.first(Vars.selectedComponents);
        return selectedComponent?.inputHandlers?.scrollConfig?.y || '';
      eventHandlers:
        onChange: |
          const selectedComponent = Utils.first(Vars.selectedComponents);
          if (!selectedComponent) return;
          const currentConfig = selectedComponent?.inputHandlers?.scrollConfig || {};
          const newConfig = { ...currentConfig, y: EventData.value };
          updateInputHandlers(selectedComponent, 'scrollConfig', newConfig);

  # Include common property blocks
  includeCommonProperties:
    - common_inputs_collapse  # Common inputs like name, id, display
    - size_collapse           # Size, width, height
