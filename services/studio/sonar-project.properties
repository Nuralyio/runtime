sonar.projectKey=Nuralyio_studio
sonar.projectName=Nuraly Studio
sonar.organization=nuralyio

# Source code
sonar.sources=src

# Test files
sonar.tests=tests

# Exclude test files from duplication analysis
sonar.exclusions=tests/**,**/*.test.ts,**/*.spec.ts

# Exclude test files and template data from code duplication metrics
sonar.cpd.exclusions=tests/**,**/*.test.ts,**/*.spec.ts,**/showcase/*.astro,**/whiteboard-templates.ts,**/workflow-templates.ts

# Coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info
