sonar.projectKey=nuraly-studio
sonar.projectName=Nuraly Studio

# Source code
sonar.sources=src

# Test files
sonar.tests=tests

# Exclude test files from duplication analysis
sonar.exclusions=tests/**,**/*.test.ts,**/*.spec.ts

# Exclude test files from code duplication metrics
sonar.cpd.exclusions=tests/**,**/*.test.ts,**/*.spec.ts

# Coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info
