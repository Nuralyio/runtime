# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=password
quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/kv_dev

# Hibernate Configuration
quarkus.hibernate-orm.database.generation=update
%dev.quarkus.hibernate-orm.database.generation=update

# Server Configuration
quarkus.http.port=7003
quarkus.http.cors.origins=*
quarkus.http.cors=true
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# Encryption Configuration
kv.encryption.master-key=${KV_MASTER_KEY:dev-master-key-32-bytes-long!!}
kv.encryption.algorithm=AES/GCM/NoPadding

# TTL Cleanup Configuration
kv.ttl.cleanup.enabled=true
kv.ttl.cleanup.interval=60s

# Audit Configuration
kv.audit.enabled=true
kv.audit.retention-days=90

# RabbitMQ Configuration
rabbitmq.host=rabbitmq
rabbitmq.port=5672
rabbitmq.username=guest
rabbitmq.password=guest
rabbitmq.queue.events=kv-events

# Permission Configuration
permissions.api.url=http://api:8000/api/permissions/has
permission.api.base-url=http://api:8000/api
# TODO: Re-enable after fixing PermissionInterceptor to forward X-USER header
%dev.permissions.enabled=false
permissions.enabled=false

# OpenAPI/Swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/api/v1/kv/swagger-ui
quarkus.smallrye-openapi.info-title=KV Storage API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API for Key-Value storage with encryption support

# Index shared library for CDI
quarkus.index-dependency.permission-lib.group-id=com.github.Nuralyio
quarkus.index-dependency.permission-lib.artifact-id=shared-java-library

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.nuraly.kv".level=DEBUG
