# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=password
quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/workflows_dev

# Connection Pool Configuration - Increased for horizontal scaling
quarkus.datasource.jdbc.min-size=10
quarkus.datasource.jdbc.max-size=50
quarkus.datasource.jdbc.acquisition-timeout=30s

# Hibernate Configuration
quarkus.hibernate-orm.database.generation=update
%dev.quarkus.hibernate-orm.database.generation=update

# Server Configuration
quarkus.http.port=7002
quarkus.http.cors.origins=*
quarkus.http.cors=true
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.exposed-headers=X-Execution-Id

# Functions Service
nuraly.functions.service.url=http://functions:7001

# KV Service
nuraly.kv.service.url=http://kv:7003

# Conduit - Database Connection & Query Service
nuraly.conduit.service.url=http://conduit:7004

# OCR Service (TextLens)
ocr.service.url=http://textlens-api:7006/api/v1

# RabbitMQ Configuration
rabbitmq.host=rabbitmq
rabbitmq.port=5672
rabbitmq.username=guest
rabbitmq.password=guest
rabbitmq.queue.events=workflow-events
rabbitmq.queue.executions=workflow-executions
rabbitmq.exchange.workflows=workflows-exchange
rabbitmq.routing-key.executions=workflow.execute

# Workflow Execution Settings
workflows.execution.timeout.default=300000
workflows.execution.max-concurrent=100
workflows.node.retry.max=3
workflows.node.retry.delay=1000

# Webhook Configuration
workflows.webhook.base-url=http://localhost:7002

# Permission Configuration
permissions.api.url=http://api:8000/api/permissions/has
permission.api.base-url=http://api:8000/api
%dev.permissions.enabled=false
permissions.enabled=false

# OpenAPI/Swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/api/v1/workflows/swagger-ui
quarkus.smallrye-openapi.info-title=Workflow Engine API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API for managing and executing workflows

# Scheduler (Quartz) - Clustered for horizontal scaling
quarkus.quartz.clustered=true
quarkus.quartz.store-type=jdbc-cmt
quarkus.quartz.start-mode=normal

# Consumer Configuration - Prefetch count for parallel message processing
workflows.consumer.prefetch=10

# Index shared library for CDI
quarkus.index-dependency.permission-lib.group-id=com.github.Nuralyio
quarkus.index-dependency.permission-lib.artifact-id=shared-java-library

# Ollama Configuration
# Default to localhost for local development; override with environment variable for Docker
ollama.api.url=${OLLAMA_API_URL:http://localhost:11434}

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.nuraly.workflows".level=DEBUG

# ===========================================
# PHASE 2 & 3: Scaling and Resilience Config
# ===========================================

# HTTP Client Pool Configuration
http.client.pool.max-total=100
http.client.pool.max-per-route=20
http.client.timeout.connect-ms=10000
http.client.timeout.socket-ms=30000
http.client.timeout.request-ms=60000

# Cache Configuration (Caffeine)
quarkus.cache.caffeine."js-expression-cache".expire-after-write=5M
quarkus.cache.caffeine."js-expression-cache".maximum-size=1000
quarkus.cache.caffeine."workflow-cache".expire-after-write=5M
quarkus.cache.caffeine."workflow-cache".maximum-size=500

# Metrics Configuration (Micrometer/Prometheus)
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.http-client.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true

# Fault Tolerance Configuration
# Circuit breaker defaults (can be overridden per method)
smallrye.faulttolerance.global.circuitbreaker.requestVolumeThreshold=10
smallrye.faulttolerance.global.circuitbreaker.failureRatio=0.5
smallrye.faulttolerance.global.circuitbreaker.delay=60000
smallrye.faulttolerance.global.circuitbreaker.successThreshold=3

# Timeout defaults
smallrye.faulttolerance.global.timeout.value=30000

# Enable fault tolerance metrics
smallrye.faulttolerance.mp-compatibility=true

# ===========================================
# Redis Configuration (Caching, Checkpoints, Locks)
# ===========================================
quarkus.redis.hosts=redis://redis:6379
quarkus.redis.timeout=10s
quarkus.redis.client-type=standalone

# Redis cache TTLs (in seconds)
redis.cache.workflow.ttl=300
redis.cache.node.ttl=300
redis.checkpoint.ttl=86400
redis.lock.ttl=60
