sonar.projectKey=nuralyio_workflows
sonar.projectName=Nuraly Workflows
sonar.organization=nuralyio

# Source code
sonar.sources=src/main/java

# Test files
sonar.tests=src/test/java

# Compiled classes (required for Java analysis)
sonar.java.binaries=target/classes

# Exclude test and generated files from analysis
sonar.exclusions=**/target/**,**/*.xml

# Coverage
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
