events {
    worker_connections 1024;
}

http {
    # Upstream pool of Conduit instances
    upstream conduit_backend {
        # Load balancing method: least_conn is best for varying request times
        least_conn;

        # Conduit instances (internal port 7004)
        server conduit-1:7004 max_fails=3 fail_timeout=30s;
        server conduit-2:7004 max_fails=3 fail_timeout=30s;
        server conduit-3:7004 max_fails=3 fail_timeout=30s;

        # Keep connections alive for better performance
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Health check endpoint (no load balancing needed)
        location /q/health {
            proxy_pass http://conduit_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # API endpoints
        location /api/ {
            proxy_pass http://conduit_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Add instance ID to response headers for debugging
            add_header X-Upstream-Server $upstream_addr;
        }

        # Swagger UI
        location /api/v1/db/swagger-ui {
            proxy_pass http://conduit_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Default
        location / {
            proxy_pass http://conduit_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
