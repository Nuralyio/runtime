# Server Configuration
quarkus.http.port=7004
quarkus.http.cors.origins=*
quarkus.http.cors=true
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# KV Service Configuration (for credential fetching)
kv.service.url=${KV_SERVICE_URL:http://kv:7003}
kv.service.timeout-ms=${KV_SERVICE_TIMEOUT_MS:5000}

# =============================================================================
# Connection Pool Configuration (Production-Optimized)
# =============================================================================
# Pool size settings
db.pool.max-size=${DB_POOL_MAX_SIZE:20}
db.pool.min-idle=${DB_POOL_MIN_IDLE:5}

# Timeout settings (fail-fast for better UX)
db.pool.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:10000}
db.pool.idle-timeout=${DB_POOL_IDLE_TIMEOUT:120000}
db.pool.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}
db.pool.keepalive-time=${DB_POOL_KEEPALIVE_TIME:30000}
db.pool.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT:5000}

# Leak detection (set to 0 to disable in production if too noisy)
db.pool.leak-detection-threshold=${DB_POOL_LEAK_DETECTION:60000}

# JMX monitoring
db.pool.register-mbeans=${DB_POOL_REGISTER_MBEANS:true}

# =============================================================================
# Redis Configuration (for caching and distributed coordination)
# Optional - service works without Redis (single-instance mode)
# =============================================================================
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
quarkus.redis.timeout=${REDIS_TIMEOUT:5s}
quarkus.redis.client-type=standalone
# Don't fail startup if Redis unavailable
quarkus.redis.health.enabled=${REDIS_HEALTH_ENABLED:false}

# Credential caching (requires Redis, gracefully disabled if unavailable)
cache.credential.enabled=${CACHE_CREDENTIAL_ENABLED:true}
cache.credential.ttl-seconds=${CACHE_CREDENTIAL_TTL:300}

# =============================================================================
# Horizontal Scaling Configuration
# Optional - requires Redis for multi-instance coordination
# =============================================================================
# Global connection limit across all instances
scaling.global-max-connections=${SCALING_GLOBAL_MAX_CONNECTIONS:100}

# Instance identification (auto-generated if not set)
scaling.instance-id=${SCALING_INSTANCE_ID:}

# Enable/disable scaling coordination (requires Redis)
scaling.enabled=${SCALING_ENABLED:true}

# =============================================================================
# Permission Configuration
# =============================================================================
permissions.api.url=${PERMISSIONS_API_URL:http://api:8000/api/permissions/has}
permission.api.base-url=${PERMISSION_API_BASE_URL:http://api:8000/api}
%dev.permissions.enabled=true
permissions.enabled=true

# =============================================================================
# Health Checks (for Kubernetes/Load Balancers)
# =============================================================================
quarkus.smallrye-health.root-path=/q/health
quarkus.smallrye-health.liveness-path=/q/health/live
quarkus.smallrye-health.readiness-path=/q/health/ready

# =============================================================================
# OpenAPI/Swagger
# =============================================================================
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/api/v1/db/swagger-ui
quarkus.smallrye-openapi.info-title=Conduit API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API for database introspection and query execution

# =============================================================================
# Index shared library for CDI
# =============================================================================
quarkus.index-dependency.permission-lib.group-id=com.github.Nuralyio
quarkus.index-dependency.permission-lib.artifact-id=shared-java-library

# =============================================================================
# Logging
# =============================================================================
quarkus.log.level=INFO
quarkus.log.category."com.nuraly.conduit".level=DEBUG
quarkus.log.category."com.zaxxer.hikari".level=INFO

# =============================================================================
# Production Profile Overrides
# =============================================================================
%prod.quarkus.log.level=INFO
%prod.quarkus.log.category."com.nuraly.conduit".level=INFO
%prod.db.pool.leak-detection-threshold=0
