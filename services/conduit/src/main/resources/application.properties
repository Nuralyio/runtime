# Server Configuration
quarkus.http.port=7004
quarkus.http.cors.origins=*
quarkus.http.cors=true
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# KV Service Configuration (for credential fetching)
kv.service.url=${KV_SERVICE_URL:http://kv:7003}

# Connection Pool Configuration
db.pool.max-size=${DB_POOL_MAX_SIZE:10}
db.pool.min-idle=${DB_POOL_MIN_IDLE:2}
db.pool.idle-timeout=${DB_POOL_IDLE_TIMEOUT:300000}
db.pool.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:30000}

# Permission Configuration
permissions.api.url=${PERMISSIONS_API_URL:http://api:8000/api/permissions/has}
permission.api.base-url=${PERMISSION_API_BASE_URL:http://api:8000/api}
%dev.permissions.enabled=true
permissions.enabled=true

# OpenAPI/Swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/api/v1/db/swagger-ui
quarkus.smallrye-openapi.info-title=Conduit API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API for database introspection and query execution

# Index shared library for CDI
quarkus.index-dependency.permission-lib.group-id=com.github.Nuralyio
quarkus.index-dependency.permission-lib.artifact-id=shared-java-library

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.nuraly.conduit".level=DEBUG
