version: '3.8'

services:
  # =============================================================================
  # Load Balancer (Nginx)
  # =============================================================================
  nginx:
    image: nginx:alpine
    ports:
      - "7004:80"
    volumes:
      - ./nginx-dynamic.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - conduit
    networks:
      - conduit-network
    restart: unless-stopped

  # =============================================================================
  # Conduit Service (Scalable)
  # =============================================================================
  conduit:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      # Instance ID auto-generated from hostname (unique per container)
      - SCALING_INSTANCE_ID=
      - REDIS_URL=redis://redis:6379
      - KV_SERVICE_URL=${KV_SERVICE_URL:-http://kv:7003}
      - DB_POOL_MAX_SIZE=${DB_POOL_MAX_SIZE:-20}
      - SCALING_GLOBAL_MAX_CONNECTIONS=${SCALING_GLOBAL_MAX_CONNECTIONS:-100}
      - SCALING_ENABLED=true
      - CACHE_CREDENTIAL_TTL=${CACHE_CREDENTIAL_TTL:-300}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - conduit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7004/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 3  # Number of instances
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  # =============================================================================
  # Redis (Shared Cache & Coordination)
  # =============================================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - conduit-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

networks:
  conduit-network:
    driver: bridge

volumes:
  redis-data:
