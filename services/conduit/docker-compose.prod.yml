version: '3.8'

services:
  conduit:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "7004-7006:7004"  # Maps to 7004, 7005, 7006 for 3 instances
    environment:
      - REDIS_URL=redis://redis:6379
      - KV_SERVICE_URL=${KV_SERVICE_URL:-http://kv:7003}
      - DB_POOL_MAX_SIZE=${DB_POOL_MAX_SIZE:-20}
      - SCALING_GLOBAL_MAX_CONNECTIONS=${SCALING_GLOBAL_MAX_CONNECTIONS:-100}
      - SCALING_ENABLED=true
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - conduit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7004/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - conduit-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

networks:
  conduit-network:

volumes:
  redis-data:
