events {
    worker_connections 1024;
}

http {
    # DNS resolver for dynamic upstream resolution
    # Docker's internal DNS resolves service names to all container IPs
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Upstream with dynamic resolution
    upstream conduit_backend {
        # Use Docker DNS to resolve all 'conduit' containers
        # The 'resolve' parameter enables dynamic updates
        server conduit:7004 resolve;

        # Keep connections alive
        keepalive 32;
    }

    # Rate limiting (optional)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    server {
        listen 80;
        server_name _;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Connection settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Health endpoints (for load balancer health checks)
        location /q/health {
            proxy_pass http://conduit_backend;
        }

        # API endpoints with rate limiting
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://conduit_backend;

            # Debug header showing which instance handled request
            add_header X-Upstream-Server $upstream_addr always;
        }

        # Swagger UI
        location /api/v1/db/swagger-ui {
            proxy_pass http://conduit_backend;
        }

        # OpenAPI spec
        location /q/openapi {
            proxy_pass http://conduit_backend;
        }

        # Default
        location / {
            proxy_pass http://conduit_backend;
        }

        # Nginx status (for monitoring)
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
    }
}
