# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=password
quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/functions_dev
quarkus.datasource.devservices.port=5433
# Hibernate - schema managed by Flyway
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.jdbc.lob.non-contextual-creation=true

# Flyway Configuration
quarkus.flyway.migrate-at-start=false
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.clean-disabled=true

# Dev only - auto-migrate for convenience
%dev.quarkus.flyway.migrate-at-start=true

# HTTP
quarkus.http.port=7001
quarkus.http.cors.origins=*
quarkus.http.cors=true
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# Swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/api/v1/functions/swagger-ui

# Function templates
nuraly.functions.template.base.path=/app/templates

# WASM Runtime
nuraly.wasm.modules-dir=/var/nuraly/wasm/modules
nuraly.wasm.temp-dir=/var/nuraly/wasm/temp
nuraly.wasm.pool.initial-size=5
nuraly.wasm.pool.max-size=100
nuraly.wasm.execution.timeout-ms=30000
nuraly.wasm.execution.max-memory-mb=64

# Network security
nuraly.wasm.network.enabled=true
nuraly.wasm.network.block-localhost=true
nuraly.wasm.network.block-private-ips=true
nuraly.wasm.network.timeout-seconds=30

# Permissions
permissions.api.url=http://api:8000/api/permissions/has
permission.api.base-url=http://api:8000/api
# TODO: Re-enable after fixing PermissionInterceptor to forward X-USER header
%dev.permissions.enabled=false
permissions.enabled=false

# Index the shared permission library for CDI/JAX-RS discovery
quarkus.index-dependency.permission-lib.group-id=com.github.Nuralyio
quarkus.index-dependency.permission-lib.artifact-id=shared-java-library

# URL Imports
nuraly.url-import.enabled=true
nuraly.url-import.timeout-seconds=30
nuraly.url-import.max-size-bytes=5242880
nuraly.url-import.max-imports=20
nuraly.url-import.allowed-domains=esm.sh,cdn.skypack.dev,unpkg.com,esm.run,cdn.jsdelivr.net
nuraly.url-import.blocked-patterns=child_process,node:fs,node:net
nuraly.url-import.cache-ttl-seconds=3600
