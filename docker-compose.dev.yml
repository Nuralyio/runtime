services:
  # Frontend - Studio
  studio:
    build:
      context: ./services/studio
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./services/studio:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:4000
      - REACT_APP_GATEWAY_URL=http://localhost:4000
    env_file:
      - config/dev.env
    depends_on:
      - gateway
    networks:
      - nuraly-network
    restart: unless-stopped

  # Core Backend - API
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
    environment:
      - NODE_ENV=development
      - BACKEND_PORT=8000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nuraly_dev
      - REDIS_URL=redis://redis:6379
    env_file:
      - config/dev.env
    depends_on:
      - postgres
      - redis
    networks:
      - nuraly-network
    restart: unless-stopped

  # Serverless Functions
  functions:
    build:
      context: ./services/functions
      dockerfile: Dockerfile.dev
    ports:
      - "9000:9000"
    volumes:
      - ./services/functions:/app
    environment:
      - NODE_ENV=development
      - PORT=9000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/functions_dev
      - REDIS_URL=redis://redis:6379
    env_file:
      - config/dev.env
    depends_on:
      - postgres
      - redis
    networks:
      - nuraly-network
    restart: unless-stopped

  # API Gateway
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile.dev
    ports:
      - "80:80"
    volumes:
      - ./services/gateway:/app
    environment:
      - NODE_ENV=development
      - PORT=4000
      - API_URL=http://api:8000
      - FUNCTIONS_URL=http://functions:9000
      - REDIS_URL=redis://redis:6379
      - KC_HOSTNAME=localhost
      - KEYCLOAK_REALM=nuraly
      - KEYCLOAK_CLIENT_ID=nuraly-web
      - KEYCLOAK_CLIENT_SECRET=dev-client-secret
      - KEYCLOAK_SCHEME=http
      - KEYCLOAK_FULLURL=http://localhost
    env_file:
      - config/dev.env
    depends_on:
      - api
      - functions
      - keycloak
      - redis
    networks:
      - nuraly-network
    restart: unless-stopped

  # Database
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=nuraly_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/development/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/development/postgres/db-backup.sql:/tmp/db-backup.sql
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - nuraly-network
    restart: unless-stopped

  # pgAdmin - PostgreSQL Management
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=dev@nuraly.io
      - PGADMIN_DEFAULT_PASSWORD=dev123
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    volumes:
      - pgadmin_dev_data:/var/lib/pgadmin
    networks:
      - nuraly-network
    restart: unless-stopped
    depends_on:
      - postgres

  # Keycloak - Authentication & Authorization
  keycloak:
    build:
      context: ./services/gateway/Keycloack
      dockerfile: Dockerfile.dev
    environment:
      KC_DB: postgres
      KC_DB_URL: 'jdbc:postgresql://postgres/keycloak'
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: password
      KC_DB_SCHEMA: public
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HOSTNAME_ADMIN_URL: http://localhost:8090/auth
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: "/auth"
      KC_HOSTNAME: localhost
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Development tools
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - nuraly-network
    restart: unless-stopped

volumes:
  postgres_dev_data:
  redis_dev_data:
  pgadmin_dev_data:

networks:
  nuraly-network:
    driver: bridge