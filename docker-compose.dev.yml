services:
  # Frontend - Studio
  studio:
    platform: linux/amd64
    build:
      context: ./services/studio
      dockerfile: Dockerfile.dev
    ports:
      - "4321:4321"
    volumes:
      - ./services/studio:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:4000
      - REACT_APP_GATEWAY_URL=http://localhost:4000
    env_file:
      - config/dev.env
    depends_on:
      - gateway
    networks:
      - nuraly-network
    restart: unless-stopped

  # Core Backend - API
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/home/node/app
      - /home/node/app/node_modules
    environment:
      - NODE_ENV=development
      - BACKEND_PORT=8000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nuraly_dev
      - REDIS_URL=redis://redis:6379
    env_file:
      - config/dev.env
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - nuraly-network
    restart: unless-stopped

  # Serverless Functions
  functions:
    build:
      context: ./services/functions
      dockerfile: Dockerfile.dev
    ports:
      - "9000:9000"
    volumes:
      - ./services/functions:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./services/functions/.kube/config:/root/.kube/config:ro
    environment:
      - NODE_ENV=development
      - PORT=9000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/functions_dev
      - REDIS_URL=redis://redis:6379
      - DOCKER_HOST=unix:///var/run/docker.sock
      - KUBECONFIG=/root/.kube/config
      - PERMISSIONS_ENABLED=false
      # RabbitMQ Configuration for Deno workers
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
    env_file:
      - config/dev.env
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - nuraly-network
      - minikube
    restart: unless-stopped

  # Workflow Engine
  workflows:
    build:
      context: ./services/workflows
      dockerfile: Dockerfile.dev
    ports:
      - "7002:7002"
    volumes:
      - ./services/workflows:/app
      - workflows_maven_cache:/root/.m2
    environment:
      - NODE_ENV=development
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/workflows_dev
      - QUARKUS_DATASOURCE_USERNAME=postgres
      - QUARKUS_DATASOURCE_PASSWORD=password
      - NURALY_FUNCTIONS_SERVICE_URL=http://functions:9000
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - PERMISSION_API_BASE_URL=http://api:8000/api
      - PERMISSIONS_API_URL=http://api:8000/api/permissions/has
      - WORKFLOWS_WEBHOOK_BASE_URL=http://localhost:7002
      - QUARKUS_REDIS_HOSTS=redis://redis:6379
    env_file:
      - config/dev.env
    depends_on:
      - postgres
      - rabbitmq
      - redis
      - api
      - functions
    networks:
      - nuraly-network
    restart: unless-stopped

  # KV Storage Service
  kv:
    build:
      context: ./services/kv
      dockerfile: Dockerfile.dev
    ports:
      - "7003:7003"
    volumes:
      - ./services/kv:/app
      - kv_maven_cache:/root/.m2
    environment:
      - NODE_ENV=development
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/kv_dev
      - QUARKUS_DATASOURCE_USERNAME=postgres
      - QUARKUS_DATASOURCE_PASSWORD=password
      - KV_MASTER_KEY=${KV_MASTER_KEY:-dev-master-key-32-bytes-long!!}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - PERMISSION_API_BASE_URL=http://api:8000/api
      - PERMISSIONS_API_URL=http://api:8000/api/permissions/has
    env_file:
      - config/dev.env
    depends_on:
      - postgres
      - rabbitmq
      - api
    networks:
      - nuraly-network
    restart: unless-stopped

  # Conduit - Database Connection & Query Service
  conduit:
    build:
      context: ./services/conduit
      dockerfile: Dockerfile.dev
    ports:
      - "7004:7004"
    volumes:
      - ./services/conduit:/app
      - conduit_maven_cache:/root/.m2
    environment:
      - NODE_ENV=development
      - KV_SERVICE_URL=http://kv:7003
      - PERMISSION_API_BASE_URL=http://api:8000/api
      - PERMISSIONS_API_URL=http://api:8000/api/permissions/has
    env_file:
      - config/dev.env
    depends_on:
      - kv
      - api
    networks:
      - nuraly-network
    restart: unless-stopped

  # Journal - Audit Log Service
  journal:
    build:
      context: ./services/journal
      dockerfile: Dockerfile.dev
    ports:
      - "7005:7005"
    volumes:
      - ./services/journal:/app
      - journal_maven_cache:/root/.m2
    environment:
      - NODE_ENV=development
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/journal_dev
      - QUARKUS_DATASOURCE_USERNAME=postgres
      - QUARKUS_DATASOURCE_PASSWORD=password
      - PERMISSION_API_BASE_URL=http://api:8000/api
      - PERMISSIONS_API_URL=http://api:8000/api/permissions/has
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
    env_file:
      - config/dev.env
    depends_on:
      - postgres
      - rabbitmq
      - api
    networks:
      - nuraly-network
    restart: unless-stopped

  # TextLens - OCR API Service
  textlens-api:
    build:
      context: ./services/textlens
      dockerfile: Dockerfile.api
    ports:
      - "7006:7006"
    volumes:
      - ./services/textlens:/app
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      - PERMISSION_API_BASE_URL=http://api:8000/api
      - PERMISSIONS_API_URL=http://api:8000/api/permissions/has
    env_file:
      - config/dev.env
    depends_on:
      - redis
      - rabbitmq
      - api
    networks:
      - nuraly-network
    restart: unless-stopped

  # Parcour - Web Crawler Service
  parcour:
    build:
      context: ./services/parcour
      dockerfile: Dockerfile.dev
    ports:
      - "7007:7007"
    volumes:
      - ./services/parcour:/app
      - parcour_maven_cache:/root/.m2
    environment:
      - NODE_ENV=development
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - RABBITMQ_QUEUE=crawl-requests
      - PERMISSION_API_BASE_URL=http://api:8000/api
      - PERMISSIONS_API_URL=http://api:8000/api/permissions/has
    env_file:
      - config/dev.env
    depends_on:
      - rabbitmq
      - api
    networks:
      - nuraly-network
    restart: unless-stopped

  # TextLens - OCR Worker Service
  textlens-worker:
    build:
      context: ./services/textlens
      dockerfile: Dockerfile.worker
    volumes:
      - ./services/textlens:/app
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
    env_file:
      - config/dev.env
    depends_on:
      - redis
      - rabbitmq
      - textlens-api
    networks:
      - nuraly-network
    restart: unless-stopped

  # API Gateway
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile.dev
    ports:
      - "80:80"
    volumes:
      - ./services/gateway:/app
    environment:
      - NODE_ENV=development
      - PORT=4000
      - API_URL=http://api:8000
      - FUNCTIONS_URL=http://functions:9000
      - WORKFLOWS_URL=http://workflows:7002
      - KV_URL=http://kv:7003
      - CONDUIT_URL=http://conduit:7004
      - REDIS_URL=redis://redis:6379
      - KC_HOSTNAME=localhost
      - KEYCLOAK_REALM=nuraly
      - KEYCLOAK_CLIENT_ID=nuraly-web
      - KEYCLOAK_CLIENT_SECRET=dev-client-secret
      - KEYCLOAK_SCHEME=http
      - KEYCLOAK_FULLURL=http://localhost
    env_file:
      - config/dev.env
    depends_on:
      - api
      - functions
      - workflows
      - kv
      - conduit
      - journal
      - textlens-api
      - keycloak
      - redis
    networks:
      - nuraly-network
    restart: unless-stopped

  # Documentation Site
  docs:
    platform: linux/amd64
    build:
      context: ./services/docs
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./services/docs:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    env_file:
      - config/dev.env
    networks:
      - nuraly-network
    restart: unless-stopped

  # Database
  postgres:
    image: pgvector/pgvector:pg15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=nuraly_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/development/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/development/postgres/db-backup.sql:/tmp/db-backup.sql
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - nuraly-network
    restart: unless-stopped

  # RabbitMQ - Message Queue for Functions Events
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_dev_data:/var/lib/rabbitmq
    networks:
      - nuraly-network
    restart: unless-stopped

  # Deno Worker - Function Execution Workers
  deno-worker:
    build:
      context: ./services/functions/worker
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/functions/worker/src:/app/src
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - EXECUTE_QUEUE=functions.execute
      - RESULTS_QUEUE=functions.results
      - DLQ_QUEUE=functions.dlq
      - PREFETCH_COUNT=5
      - DEFAULT_TIMEOUT=30000
      - ALLOWED_HOSTS=esm.sh,cdn.jsdelivr.net,cdn.skypack.dev,unpkg.com,esm.run
    depends_on:
      - rabbitmq
    deploy:
      replicas: 2
    networks:
      - nuraly-network
    restart: unless-stopped

  # pgAdmin - PostgreSQL Management
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=dev@nuraly.io
      - PGADMIN_DEFAULT_PASSWORD=dev123
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    volumes:
      - pgadmin_dev_data:/var/lib/pgadmin
    networks:
      - nuraly-network
    restart: unless-stopped
    depends_on:
      - postgres

  # Keycloak - Authentication & Authorization
  keycloak:
    build:
      context: ./services/gateway/Keycloack
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/gateway/Keycloack/keywind/theme/keywind:/opt/keycloak/themes/keywind
    environment:
      KC_DB: postgres
      KC_DB_URL: 'jdbc:postgresql://postgres/keycloak'
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: password
      KC_DB_SCHEMA: public
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HOSTNAME_ADMIN_URL: http://localhost:8090/auth
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: "/auth"
      KC_HOSTNAME: localhost
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Development tools
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - nuraly-network
    restart: unless-stopped

volumes:
  postgres_dev_data:
  redis_dev_data:
  pgadmin_dev_data:
  rabbitmq_dev_data:
  workflows_maven_cache:
  kv_maven_cache:
  conduit_maven_cache:
  journal_maven_cache:
  parcour_maven_cache:

networks:
  nuraly-network:
    driver: bridge
  minikube:
    external: true