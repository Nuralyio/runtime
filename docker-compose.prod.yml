services:
  # Frontend - Studio
  studio:
    image: ghcr.io/nuralyio/studio:latest
    expose:
      - "4321"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
    env_file:
      - config/prod.env
    depends_on:
      gateway:
        condition: service_started
      api:
        condition: service_started
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4321"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Core Backend - API
  api:
    image: ghcr.io/nuralyio/api:latest
    expose:
      - "8000"
    environment:
      - NODE_ENV=production
      - BACKEND_PORT=8000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nuraly_prod
      - REDIS_URL=redis://redis:6379
    env_file:
      - config/prod.env
    depends_on:
      - postgres
      - redis
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Serverless Functions
  functions:
    image: ghcr.io/nuralyio/functions:latest
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=development
      - PORT=9000
      - QUARKUS_HTTP_PORT=9000
      - QUARKUS_DATASOURCE_USERNAME=postgres
      - QUARKUS_DATASOURCE_PASSWORD=postgres
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/functions_prod
      - REDIS_URL=redis://redis:6379
    env_file:
      - config/prod.env
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Workflow Engine
  workflows:
    image: ghcr.io/nuralyio/workflows:latest
    expose:
      - "7002"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/workflows_prod
      - QUARKUS_DATASOURCE_USERNAME=postgres
      - QUARKUS_DATASOURCE_PASSWORD=postgres
      - NURALY_FUNCTIONS_SERVICE_URL=http://functions:9000
      - NURALY_KV_SERVICE_URL=http://kv:7003
      - NURALY_CONDUIT_SERVICE_URL=http://conduit:7004
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - PERMISSION_API_BASE_URL=http://api:8000/api
      - PERMISSIONS_API_URL=http://api:8000/api/permissions/has
      - WORKFLOWS_WEBHOOK_BASE_URL=http://workflows:7002
      - QUARKUS_REDIS_HOSTS=redis://redis:6379
    env_file:
      - config/prod.env
    depends_on:
      - postgres
      - rabbitmq
      - redis
      - api
      - functions
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7002/q/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # KV Storage Service
  kv:
    image: ghcr.io/nuralyio/kv:latest
    expose:
      - "7003"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/kv_prod
      - QUARKUS_DATASOURCE_USERNAME=postgres
      - QUARKUS_DATASOURCE_PASSWORD=postgres
      - KV_MASTER_KEY=${KV_MASTER_KEY}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - PERMISSION_API_BASE_URL=http://api:8000/api
      - PERMISSIONS_API_URL=http://api:8000/api/permissions/has
    env_file:
      - config/prod.env
    depends_on:
      - postgres
      - rabbitmq
      - api
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7003/q/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Conduit - Database Connection & Query Service
  conduit:
    image: ghcr.io/nuralyio/conduit:latest
    expose:
      - "7004"
    environment:
      - KV_SERVICE_URL=http://kv:7003
      - PERMISSION_API_BASE_URL=http://api:8000/api
      - PERMISSIONS_API_URL=http://api:8000/api/permissions/has
    env_file:
      - config/prod.env
    depends_on:
      - kv
      - api
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7004/q/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Journal - Audit Log Service
  journal:
    image: ghcr.io/nuralyio/journal:latest
    expose:
      - "7005"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/journal_prod
      - QUARKUS_DATASOURCE_USERNAME=postgres
      - QUARKUS_DATASOURCE_PASSWORD=postgres
      - PERMISSION_API_BASE_URL=http://api:8000/api
      - PERMISSIONS_API_URL=http://api:8000/api/permissions/has
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
    env_file:
      - config/prod.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7005/q/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Parcour - Web Crawler Service
  parcour:
    image: ghcr.io/nuralyio/parcour:latest
    expose:
      - "7007"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - RABBITMQ_QUEUE=crawl-requests
      - PERMISSION_API_BASE_URL=http://api:8000/api
      - PERMISSIONS_API_URL=http://api:8000/api/permissions/has
    env_file:
      - config/prod.env
    depends_on:
      - rabbitmq
      - api
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7007/q/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # TextLens - OCR API Service
  textlens-api:
    image: ghcr.io/nuralyio/textlens-api:latest
    expose:
      - "7006"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      - PERMISSION_API_BASE_URL=http://api:8000/api
      - PERMISSIONS_API_URL=http://api:8000/api/permissions/has
    env_file:
      - config/prod.env
    depends_on:
      - redis
      - rabbitmq
      - api
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # TextLens - OCR Worker Service
  textlens-worker:
    image: ghcr.io/nuralyio/textlens-worker:latest
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
    env_file:
      - config/prod.env
    depends_on:
      - redis
      - rabbitmq
      - textlens-api
    networks:
      - nuraly-network
    restart: unless-stopped

  # Deno Worker - Function Execution Workers
  deno-worker:
    image: ghcr.io/nuralyio/deno-worker:latest
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - EXECUTE_QUEUE=functions.execute
      - RESULTS_QUEUE=functions.results
      - DLQ_QUEUE=functions.dlq
      - PREFETCH_COUNT=5
      - DEFAULT_TIMEOUT=30000
      - ALLOWED_HOSTS=esm.sh,cdn.jsdelivr.net,cdn.skypack.dev,unpkg.com,esm.run
    depends_on:
      - rabbitmq
    deploy:
      replicas: 2
    networks:
      - nuraly-network
    restart: unless-stopped

  # API Gateway
  gateway:
    image: ghcr.io/nuralyio/gateway:latest
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:8000
      - FUNCTIONS_URL=http://functions:9000
      - WORKFLOWS_URL=http://workflows:7002
      - KV_URL=http://kv:7003
      - CONDUIT_URL=http://conduit:7004
      - REDIS_URL=redis://redis:6379
    env_file:
      - config/prod.env
    depends_on:
      - api
      - functions
      - workflows
      - kv
      - conduit
      - journal
      - textlens-api
      - redis
      - keycloak
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Documentation Site
  docs:
    image: ghcr.io/nuralyio/docs:latest
    ports:
      - "6009:80"
    environment:
      - NODE_ENV=production
    env_file:
      - config/prod.env
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Keycloak - Authentication
  keycloak:
    image: ghcr.io/nuralyio/keycloak:latest
    environment:
      KC_DB: postgres
      KC_DB_URL: 'jdbc:postgresql://postgres/keycloak'
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_DB_SCHEMA: public
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      MAIN_DOMAIN: ${MAIN_DOMAIN}
      MAIN_PROTOCOL: ${MAIN_PROTOCOL}
      KC_HTTP_RELATIVE_PATH: "/auth"
    env_file:
      - config/prod.env
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Database
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nuraly_prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/production/postgres/00-init-databases.sql:/docker-entrypoint-initdb.d/00-init-databases.sql
      - ./docker/production/postgres/db-seed.sql:/docker-entrypoint-initdb.d/01-seed.sql
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RabbitMQ - Message Queue for Functions Events
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_prod_data:
  redis_prod_data:
  rabbitmq_prod_data:

networks:
  nuraly-network:
    driver: bridge
