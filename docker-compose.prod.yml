services:
  # Frontend - Studio
  studio:
    build:
      context: ./services/studio
      dockerfile: Dockerfile
      args:
        DASHBOARD_APP_UUID: e5ea6ef3-f467-402c-bacf-199d68bdc63d
        DASHBOARD_PAGE_UUID: f4cfcf9a-9439-4db2-aa60-9680d7c94acc
        HOME_APP_UUID: 862d84a4-0be4-4cd0-8255-77f270094ff8
        HOME_PAGE_UUID: bc16eab3-9d6d-433a-8550-53f26897574c
    expose:
      - "4321"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
    env_file:
      - config/prod.env
    depends_on:
      gateway:
        condition: service_started
      api:
        condition: service_started
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4321"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Core Backend - API
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - NODE_ENV=production
      - BACKEND_PORT=8000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nuraly_prod
      - REDIS_URL=redis://redis:6379
    env_file:
      - config/prod.env
    depends_on:
      - postgres
      - redis
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Serverless Functions (dev mode for hot reload)
  functions:
    build:
      context: ./services/functions
      dockerfile: Dockerfile.dev
    ports:
      - "9000:9000"
    volumes:
      - ./services/functions:/app
      - ./services/functions/.kube/config:/root/.kube/config:ro
      - ~/.minikube/certs:/certs:ro
    environment:
      - NODE_ENV=development
      - PORT=9000
      - QUARKUS_HTTP_PORT=9000
      - QUARKUS_DATASOURCE_USERNAME=postgres
      - QUARKUS_DATASOURCE_PASSWORD=postgres
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/functions_prod
      - REDIS_URL=redis://redis:6379
      # Use minikube's Docker daemon for building images (connects via minikube network)
      - DOCKER_HOST=tcp://minikube:2376
      - DOCKER_TLS_VERIFY=1
      - DOCKER_CERT_PATH=/certs
      - KUBECONFIG=/root/.kube/config
    env_file:
      - config/prod.env
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - nuraly-network
      - minikube
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway (handles all routing like in dev)
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "8094:80"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:8000
      - FUNCTIONS_URL=http://functions:9000
      - REDIS_URL=redis://redis:6379
    env_file:
      - config/prod.env
    depends_on:
      - api
      - functions
      - redis
      - keycloak
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Documentation Site
  docs:
    build:
      context: ./services/docs
    ports:
      - "6009:80"
    environment:
      - NODE_ENV=production
    env_file:
      - config/prod.env
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Keycloak - Authentication
  keycloak:
    build:
      context: ./services/gateway/Keycloack
      dockerfile: Dockerfile.prod
    environment:
      KC_DB: postgres
      KC_DB_URL: 'jdbc:postgresql://postgres/keycloak'
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_DB_SCHEMA: public
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HOSTNAME_ADMIN_URL: http://localhost:8090/auth
      KC_HTTP_RELATIVE_PATH: "/auth"
      KC_HOSTNAME: localhost
    env_file:
      - config/prod.env
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nuraly_prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/production/postgres/00-init-databases.sql:/docker-entrypoint-initdb.d/00-init-databases.sql
      - ./docker/production/postgres/db-seed.sql:/docker-entrypoint-initdb.d/01-seed.sql
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RabbitMQ - Message Queue for Functions Events
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    networks:
      - nuraly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_prod_data:
  redis_prod_data:
  rabbitmq_prod_data:

networks:
  nuraly-network:
    driver: bridge
  minikube:
    external: true
